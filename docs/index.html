<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Test Framework</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; width: 100%; max-width: 620px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input[type="text"] { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; outline: none; }
    input:focus { border-color: #388bfd; }
    .field { margin-bottom: 16px; }
    .btn { width: 100%; padding: 11px; background: #238636; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
    .status.running { background: #1c2d3a; border: 1px solid #388bfd; color: #79c0ff; display: block; }
    .status.success { background: #1a2f1a; border: 1px solid #3fb950; color: #56d364; display: block; }
    .status.failure { background: #2d1a1a; border: 1px solid #f85149; color: #ff7b72; display: block; }
    .status a { color: inherit; font-weight: 600; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #388bfd; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #video-wrap { display: none; margin-top: 20px; }
    #video-wrap video { width: 100%; border-radius: 8px; border: 1px solid #30363d; }
    #video-wrap .video-label { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
    .download-btn { display: inline-block; margin-top: 10px; padding: 7px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 13px; text-decoration: none; }
    .download-btn:hover { background: #30363d; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎰 Auto Test Framework</h1>
  <p class="subtitle">RubyPlay slot game automation</p>

  <div class="field">
    <label>Game URL</label>
    <input type="text" id="game-url" placeholder="https://dev.rubyplay.com/launcher?gamename=...&playerSession=EUR-..." />
  </div>

  <button class="btn" id="run-btn" onclick="runTest()">▶ Run Test</button>

  <div class="status" id="status"></div>

  <div id="video-wrap">
    <p class="video-label">Test recording:</p>
    <video id="video-player" controls></video>
    <br/>
    <a id="download-link" class="download-btn" href="#" download>⬇ Download video</a>
  </div>
</div>

<script>
  const VERCEL_BASE = 'https://auto-test-framework.vercel.app';
  const OWNER = 'AlexPinkQA';
  const REPO  = 'Auto-Test-Framework';
  const LOCAL_SERVER = 'http://localhost:3000';

  let localAvailable = false;

  // Probe local server on page load
  async function probeLocal() {
    try {
      const res = await fetch(`${LOCAL_SERVER}/status`, { signal: AbortSignal.timeout(800) });
      localAvailable = res.ok;
    } catch {}
    if (localAvailable) {
      document.querySelector('.subtitle').textContent = '🟢 Local mode — browser window will open automatically';
    }
  }
  probeLocal();

  function showStatus(type, html) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = html;
  }

  async function runTest() {
    const gameUrl = document.getElementById('game-url').value.trim();
    if (!gameUrl) { showStatus('failure', 'Please enter a game URL.'); return; }

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    document.getElementById('video-wrap').style.display = 'none';

    // Re-probe in case server just started
    await probeLocal();

    if (localAvailable) {
      await runLocal(gameUrl, btn);
    } else {
      await runRemote(gameUrl, btn);
    }
  }

  // ── LOCAL MODE ────────────────────────────────────────────────────────────────
  async function runLocal(gameUrl, btn) {
    showStatus('running', '<span class="spinner"></span>Starting test… browser will open automatically.');
    try {
      const res = await fetch(`${LOCAL_SERVER}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_url: gameUrl }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      pollLocalStatus(btn);
    } catch (e) {
      showStatus('failure', '❌ ' + e.message + '<br><small>Make sure <b>npm run serve</b> is running in your terminal.</small>');
      btn.disabled = false;
    }
  }

  async function pollLocalStatus(btn) {
    for (let i = 0; i < 120; i++) {
      await new Promise(r => setTimeout(r, 2000));
      try {
        const { status } = await fetch(`${LOCAL_SERVER}/status`).then(r => r.json());
        if (status === 'passed') {
          showStatus('success', '✅ Test passed!');
          btn.disabled = false;
          return;
        }
        if (status === 'failed') {
          showStatus('failure', '❌ Test failed. Check the terminal for details.');
          btn.disabled = false;
          return;
        }
      } catch {}
    }
    showStatus('failure', '⏱ Timeout waiting for test result.');
    btn.disabled = false;
  }

  // ── REMOTE MODE (GitHub Actions) ─────────────────────────────────────────────
  async function runRemote(gameUrl, btn) {
    showStatus('running', '<span class="spinner"></span>Starting test...');

    // Open GitHub Actions page in new tab immediately (before async, to avoid popup block)
    const actionsTab = window.open(`https://github.com/${OWNER}/${REPO}/actions`, '_blank');

    try {
      const res = await fetch(`${VERCEL_BASE}/api/trigger`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_url: gameUrl }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      showStatus('running', '<span class="spinner"></span>Test is running...');
      await new Promise(r => setTimeout(r, 6000));
      pollRun(actionsTab, btn);
    } catch (e) {
      showStatus('failure', '❌ ' + e.message);
      btn.disabled = false;
    }
  }

  async function pollRun(actionsTab, btn) {
    const runsUrl = `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?event=workflow_dispatch&per_page=1`;
    let runOpened = false;

    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 5000));
      try {
        const run = await fetch(runsUrl).then(r => r.json()).then(d => d.workflow_runs?.[0]);
        if (!run) continue;

        const runUrl = `https://github.com/${OWNER}/${REPO}/actions/runs/${run.id}`;

        if (!runOpened && actionsTab && !actionsTab.closed) {
          actionsTab.location.href = runUrl;
          runOpened = true;
        }

        if (run.status === 'completed') {
          const ok = run.conclusion === 'success';
          const icon = ok ? '✅' : '❌';
          showStatus(ok ? 'success' : 'failure',
            `${icon} Test ${run.conclusion}! <a href="${runUrl}" target="_blank">View run →</a>`);
          if (ok) loadVideo(run.id, runUrl);
          btn.disabled = false;
          return;
        }

        showStatus('running',
          `<span class="spinner"></span>Status: <b>${run.status}</b> — <a href="${runUrl}" target="_blank">View run →</a>`);
      } catch {}
    }

    showStatus('failure', '⏱ Timeout. <a href="https://github.com/' + OWNER + '/' + REPO + '/actions" target="_blank">Check manually →</a>');
    btn.disabled = false;
  }

  async function loadVideo(runId, runUrl) {
    try {
      const res = await fetch(`${VERCEL_BASE}/api/video?run_id=${runId}`);
      const { url } = await res.json();
      if (!url) throw new Error('No URL');

      await new Promise(r => setTimeout(r, 3000));
      const zipRes = await fetch(url);
      if (!zipRes.ok) throw new Error('ZIP fetch failed');
      const zipData = await zipRes.arrayBuffer();

      const zip = await JSZip.loadAsync(zipData);
      const webmEntry = Object.values(zip.files).find(f => f.name.endsWith('.webm'));
      if (!webmEntry) throw new Error('No video in artifact');

      const blob = new Blob([await webmEntry.async('arraybuffer')], { type: 'video/webm' });
      const blobUrl = URL.createObjectURL(blob);

      const video = document.getElementById('video-player');
      const dlLink = document.getElementById('download-link');
      video.src = blobUrl;
      dlLink.href = blobUrl;
      dlLink.download = `test-run-${runId}.webm`;
      document.getElementById('video-wrap').style.display = 'block';
    } catch (e) {
      showStatus('success',
        `✅ Test passed! <a href="${runUrl}" target="_blank">Download video on GitHub →</a>`);
    }
  }
</script>
</body>
</html>
