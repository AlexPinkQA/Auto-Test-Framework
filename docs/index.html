<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Test Framework</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; width: 100%; max-width: 560px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3; font-size: 14px; outline: none;
    }
    input:focus { border-color: #388bfd; }
    .field { margin-bottom: 16px; }
    .btn {
      width: 100%; padding: 11px; background: #238636; border: none; border-radius: 8px;
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
    .status.running { background: #1c2d3a; border: 1px solid #388bfd; color: #79c0ff; display: block; }
    .status.success { background: #1a2f1a; border: 1px solid #3fb950; color: #56d364; display: block; }
    .status.failure { background: #2d1a1a; border: 1px solid #f85149; color: #ff7b72; display: block; }
    .status a { color: inherit; }
    .token-row { display: flex; gap: 8px; }
    .token-row input { flex: 1; }
    .btn-sm { padding: 10px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { background: #30363d; }
    .hint { font-size: 12px; color: #8b949e; margin-top: 5px; }
    .hint a { color: #58a6ff; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #388bfd; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>🎰 Auto Test Framework</h1>
  <p class="subtitle">RubyPlay slot game automation</p>

  <div class="field">
    <label>GitHub Token</label>
    <div class="token-row">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
      <button class="btn-sm" onclick="saveToken()">Save</button>
    </div>
    <p class="hint">Need a token? <a href="https://github.com/settings/tokens/new?scopes=repo,workflow" target="_blank">Create one here</a> (select <code>repo</code> + <code>workflow</code> scopes)</p>
  </div>

  <div class="field">
    <label>Game URL</label>
    <input type="text" id="game-url" placeholder="https://dev.rubyplay.com/launcher?gamename=...&playerSession=EUR-..." />
  </div>

  <button class="btn" id="run-btn" onclick="runTest()">▶ Run Test</button>

  <div class="status" id="status"></div>
</div>

<script>
  const OWNER = 'AlexPinkQA';
  const REPO  = 'Auto-Test-Framework';
  const WORKFLOW = 'run-test.yml';

  window.onload = () => {
    const saved = localStorage.getItem('gh_token');
    if (saved) document.getElementById('gh-token').value = saved;
  };

  function saveToken() {
    const t = document.getElementById('gh-token').value.trim();
    if (t) { localStorage.setItem('gh_token', t); showStatus('success', 'Token saved.'); }
  }

  function showStatus(type, html) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = html;
  }

  async function runTest() {
    const token   = document.getElementById('gh-token').value.trim();
    const gameUrl = document.getElementById('game-url').value.trim();

    if (!token)   { showStatus('failure', 'Please enter your GitHub token.'); return; }
    if (!gameUrl) { showStatus('failure', 'Please enter a game URL.'); return; }

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    showStatus('running', '<span class="spinner"></span>Triggering test...');

    try {
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
        {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: 'main', inputs: { game_url: gameUrl } }),
        }
      );

      if (res.status !== 204) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      showStatus('running', '<span class="spinner"></span>Test started! Waiting for result...');
      await new Promise(r => setTimeout(r, 5000));
      pollRun(token);
    } catch (e) {
      showStatus('failure', '❌ ' + e.message);
      btn.disabled = false;
    }
  }

  async function pollRun(token) {
    const headers = { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' };
    const runsUrl = `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?event=workflow_dispatch&per_page=1`;

    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 5000));
      try {
        const run = await fetch(runsUrl, { headers }).then(r => r.json()).then(d => d.workflow_runs?.[0]);
        if (!run) continue;

        const runsLink = `https://github.com/${OWNER}/${REPO}/actions/runs/${run.id}`;

        if (run.status === 'completed') {
          const success = run.conclusion === 'success';
          const icon = success ? '✅' : '❌';
          const type = success ? 'success' : 'failure';
          showStatus(type, `${icon} Test ${run.conclusion}! <a href="${runsLink}" target="_blank">View run & download video →</a>`);
          document.getElementById('run-btn').disabled = false;
          return;
        }

        showStatus('running', `<span class="spinner"></span>Status: <b>${run.status}</b> — <a href="${runsLink}" target="_blank">View run →</a>`);
      } catch {}
    }

    showStatus('failure', '⏱ Timeout waiting for result. <a href="https://github.com/' + OWNER + '/' + REPO + '/actions" target="_blank">Check manually →</a>');
    document.getElementById('run-btn').disabled = false;
  }
</script>
</body>
</html>
